server {
    listen 80;
    server_name _;

    # Базовая раздача (на всякий случай).
    location / {
        root /usr/share/nginx/html;
    }

    # Версионированный путь: /c/<версия>/<файл> → client/<файл>.
    # Новый сегмент версии = свежий кэш-ключ Cloudflare (обходим залипшие 404),
    # при этом корректные 200 спокойно кэшируются на edge (оптимизация сохраняется).
    location ~ ^/c/[^/]+/(.*)$ {
        alias /usr/share/nginx/html/client/$1;
        add_header Accept-Ranges bytes;
    }
}
