name: Release (Windows)

# Сборка и публикация Windows-инсталлятора + артефактов автообновления.
# Триггерится тегом вида v1.2.3.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend deps
        run: npm ci

      # Проваливаем сборку, если HMAC-секрет не задан — иначе в бинарь уедет
      # небезопасный дефолт (dev-insecure-secret-change-me) и authorize можно подделать.
      - name: Verify launcher HMAC secret is set
        shell: bash
        env:
          LAUNCHER_HMAC_SECRET: ${{ secrets.LAUNCHER_HMAC_SECRET }}
        run: |
          if [ -z "$LAUNCHER_HMAC_SECRET" ]; then
            echo "::error::secrets.LAUNCHER_HMAC_SECRET не задан — сборка остановлена"
            exit 1
          fi

      - name: Build & release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Приватный ключ апдейтера и его пароль — в секретах репозитория.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Общий с бэкендом HMAC-секрет авторизации лаунчера (вшивается при сборке).
          LAUNCHER_HMAC_SECRET: ${{ secrets.LAUNCHER_HMAC_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "L2 Interlude Launcher ${{ github.ref_name }}"
          releaseBody: "Установщик (.exe/.msi) ниже. Также есть портативная версия L2-Interlude-portable.exe — скачал и запустил, без установки (нужен системный WebView2, есть в Windows 10/11)."
          releaseDraft: false
          prerelease: false
          # latest.json для встроенного апдейтера Tauri публикуется автоматически.
          includeUpdaterJson: true

      - name: Upload portable exe
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Cargo workspace → бинарь в корневом target/release. Ищем в обоих местах.
          EXE=""
          for c in target/release/l2-launcher.exe src-tauri/target/release/l2-launcher.exe; do
            if [ -f "$c" ]; then EXE="$c"; break; fi
          done
          if [ -z "$EXE" ]; then EXE=$(find . -path ./node_modules -prune -o -name 'l2-launcher.exe' -print | head -1); fi
          echo "portable exe: $EXE"
          cp "$EXE" "L2-Interlude-portable.exe"
          gh release upload "${{ github.ref_name }}" "L2-Interlude-portable.exe" \
            --repo "${{ github.repository }}" --clobber
